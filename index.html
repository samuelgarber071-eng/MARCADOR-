<!DOCTYPE html>
<html lang="pt-BR" dir="ltr" id="app-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Bookmark Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex flex-col transition-colors duration-300">

    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3 rtl:space-x-reverse">
            <i class="fa-solid fa-bookmark text-indigo-500 text-2xl"></i>
            <span class="text-xl font-bold tracking-wider" id="txt-logo">Bookmarks</span>
        </div>
        <nav class="flex space-x-2 rtl:space-x-reverse">
            <button onclick="switchTab('dashboard')" id="btn-nav-dash" class="px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium shadow transition-all">
                <i class="fa-solid fa-layer-group mr-2 rtl:ml-2 rtl:mr-0"></i><span id="txt-nav-dash">Dashboard</span>
            </button>
            <button onclick="switchTab('settings')" id="btn-nav-settings" class="px-4 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white font-medium transition-all">
                <i class="fa-solid fa-gear mr-2 rtl:ml-2 rtl:mr-0"></i><span id="txt-nav-settings">Configurações</span>
            </button>
        </nav>
    </header>

    <main class="flex-1 p-6 max-w-6xl w-full mx-auto">
        
        <section id="tab-dashboard" class="space-y-6">
            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-md">
                <h2 class="text-lg font-semibold mb-4 text-indigo-400" id="title-add">Adicionar Novo Marcador</h2>
                <form id="bookmark-form" onsubmit="addBookmark(event)" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="input-title" required placeholder="Título do site" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <input type="url" id="input-url" required placeholder="https://exemplo.com" class="bg-gray-700 border border-gray-600 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                    <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 px-6 rounded-lg transition-colors flex items-center justify-center space-x-2">
                        <i class="fa-solid fa-plus"></i> <span id="btn-add">Adicionar</span>
                    </button>
                </form>
            </div>

            <div class="flex flex-wrap justify-between items-center gap-4 border-b border-gray-700 pb-4">
                <div class="flex space-x-2 rtl:space-x-reverse" id="filter-container">
                    <button onclick="filterBookmarks('all')" id="filter-all" class="px-4 py-1.5 rounded-full text-xs font-semibold bg-indigo-500/20 text-indigo-400 border border-indigo-500/30">Todos</button>
                    <button onclick="filterBookmarks('active')" id="filter-active" class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-850 text-gray-400 hover:bg-gray-800">Ativos</button>
                    <button onclick="filterBookmarks('archived')" id="filter-archived" class="px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-850 text-gray-400 hover:bg-gray-800">Arquivados</button>
                </div>
                
                <div class="flex items-center space-x-1 bg-gray-800 p-1 rounded-lg border border-gray-700">
                    <button onclick="changeLayout('grid')" id="layout-grid" class="p-2 rounded bg-indigo-600 text-white"><i class="fa-solid fa-grid-2"></i> Grid</button>
                    <button onclick="changeLayout('list')" id="layout-list" class="p-2 rounded text-gray-400 hover:text-white"><i class="fa-solid fa-list"></i> Lista</button>
                </div>
            </div>

            <div id="bookmarks-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </section>

        <section id="tab-settings" class="hidden space-y-6">
            <div class="bg-gray-800 p-8 rounded-xl border border-gray-700 shadow-md max-w-2xl mx-auto">
                <div class="flex items-center space-x-3 rtl:space-x-reverse border-b border-gray-700 pb-4 mb-6">
                    <i class="fa-solid fa-sliders text-indigo-500 text-2xl"></i>
                    <h2 class="text-xl font-bold" id="title-settings">Sala de Configurações</h2>
                </div>

                <div class="space-y-3">
                    <label class="block text-sm font-medium text-gray-400" id="label-lang">Selecione o Idioma do Sistema</label>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        <button onclick="setLanguage('pt')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="pt">
                            <span>Português</span><span class="text-xs text-gray-500">PT-BR</span>
                        </button>
                        <button onclick="setLanguage('en')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="en">
                            <span>English</span><span class="text-xs text-gray-500">EN</span>
                        </button>
                        <button onclick="setLanguage('es')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="es">
                            <span>Español</span><span class="text-xs text-gray-500">ES</span>
                        </button>
                        <button onclick="setLanguage('zh')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="zh">
                            <span>简体中文</span><span class="text-xs text-gray-500">ZH</span>
                        </button>
                        <button onclick="setLanguage('ja')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="ja">
                            <span>日本語</span><span class="text-xs text-gray-500">JA</span>
                        </button>
                        <button onclick="setLanguage('he')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="he">
                            <span>עברית</span><span class="text-xs text-gray-500">HE (RTL)</span>
                        </button>
                        <button onclick="setLanguage('ar')" class="lang-btn flex items-center justify-between p-3 rounded-lg border border-gray-700 bg-gray-850 hover:border-indigo-500 transition-all" data-lang="ar">
                            <span>العربية</span><span class="text-xs text-gray-500">AR (RTL)</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="bg-gray-950 text-center py-4 text-xs text-gray-600 border-t border-gray-850 mt-12">
        &copy; 2026 Modern Bookmarks. All rights reserved.
    </footer>

    <script>
        // Dicionário de Idiomas (Suporta LTR e RTL)
        const translations = {
            pt: { dir: "ltr", logo: "Marcadores", navDash: "Dashboard", navSettings: "Configurações", titleAdd: "Adicionar Novo Marcador", phTitle: "Título do site", phUrl: "https://exemplo.com", btnAdd: "Adicionar", filterAll: "Todos", filterActive: "Ativos", filterArchived: "Arquivados", titleSettings: "Sala de Configurações", labelLang: "Selecione o Idioma do Sistema", btnArchive: "Arquivar", btnUnarchive: "Desarquivar", btnDelete: "Excluir" },
            en: { dir: "ltr", logo: "Bookmarks", navDash: "Dashboard", navSettings: "Settings", titleAdd: "Add New Bookmark", phTitle: "Site title", phUrl: "https://example.com", btnAdd: "Add", filterAll: "All", filterActive: "Active", filterArchived: "Archived", titleSettings: "Settings Room", labelLang: "Select System Language", btnArchive: "Archive", btnUnarchive: "Unarchive", btnDelete: "Delete" },
            es: { dir: "ltr", logo: "Marcadores", navDash: "Panel", navSettings: "Ajustes", titleAdd: "Añadir Nuevo Marcador", phTitle: "Título del sitio", phUrl: "https://ejemplo.com", btnAdd: "Añadir", filterAll: "Todos", filterActive: "Activos", filterArchived: "Archivados", titleSettings: "Sala de Ajustes", labelLang: "Seleccione o Idioma del Sistema", btnArchive: "Archivar", btnUnarchive: "Desarchivar", btnDelete: "Eliminar" },
            zh: { dir: "ltr", logo: "书签管理", navDash: "仪表板", navSettings: "设置中心", titleAdd: "添加新书签", phTitle: "网站标题", phUrl: "https://example.com", btnAdd: "添加", filterAll: "全部", filterActive: "有效", filterArchived: "已归档", titleSettings: "控制配置室", labelLang: "选择系统语言", btnArchive: "归档", btnUnarchive: "取消归档", btnDelete: "删除" },
            ja: { dir: "ltr", logo: "ブックマーク", navDash: "ダッシュボード", navSettings: "設定ルーム", titleAdd: "新規ブックマーク追加", phTitle: "サイトタイトル", phUrl: "https://example.com", btnAdd: "追加", filterAll: "すべて", filterActive: "アクティブ", filterArchived: "アーカイブ済", titleSettings: "設定コントロール", labelLang: "システム言語の選択", btnArchive: "アーカイブ", btnUnarchive: "元に戻す", btnDelete: "削除" },
            he: { dir: "rtl", logo: "סימניות", navDash: "לוח בקרה", navSettings: "הגדרות", titleAdd: "הוסף סימנייה חדשה", phTitle: "כותרת האתר", phUrl: "https://example.com", btnAdd: "הוסף", filterAll: "הכל", filterActive: "פעיל", filterArchived: "בארכיון", titleSettings: "חדר הגדרות", labelLang: "בחר שפת מערכת", btnArchive: "ארכיון", btnUnarchive: "החזר מארכיון", btnDelete: "מחק" },
            ar: { dir: "rtl", logo: "إشارات مرجعية", navDash: "لوحة التحكم", navSettings: "الإعدادات", titleAdd: "إضافة إشارة مرجعية جديدة", phTitle: "عنوان الموقع", phUrl: "https://example.com", btnAdd: "إضافة", filterAll: "الكل", filterActive: "نشط", filterArchived: "مؤرشف", titleSettings: "غرفة الإعدادات", labelLang: "اختر لغة النظام", btnArchive: "أرشفة", btnUnarchive: "إلغاء الأرشفة", btnDelete: "حذف" }
        };

        // Estado da Aplicação
        let currentLang = 'pt';
        let currentLayout = 'grid'; // grid ou list
        let currentFilter = 'all'; // all, active, archived
        let bookmarks = [
            { id: 1, title: 'Google', url: 'https://google.com', status: 'active' },
            { id: 2, title: 'GitHub', url: 'https://github.com', status: 'active' },
            { id: 3, title: 'MDN Web Docs', url: 'https://developer.mozilla.org', status: 'archived' }
        ];

        // Alternar entre Abas (Dashboard vs Configurações)
        function switchTab(tab) {
            const dash = document.getElementById('tab-dashboard');
            const settings = document.getElementById('tab-settings');
            const btnDash = document.getElementById('btn-nav-dash');
            const btnSettings = document.getElementById('btn-nav-settings');

            if (tab === 'dashboard') {
                dash.classList.remove('hidden');
                settings.classList.add('hidden');
                btnDash.className = "px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium shadow transition-all";
                btnSettings.className = "px-4 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white font-medium transition-all";
            } else {
                dash.classList.add('hidden');
                settings.classList.remove('hidden');
                btnSettings.className = "px-4 py-2 rounded-lg bg-indigo-600 text-white font-medium shadow transition-all";
                btnDash.className = "px-4 py-2 rounded-lg text-gray-400 hover:bg-gray-700 hover:text-white font-medium transition-all";
            }
        }

        // Alterar Layout (Grid vs Lista)
        function changeLayout(layout) {
            currentLayout = layout;
            const btnGrid = document.getElementById('layout-grid');
            const btnList = document.getElementById('layout-list');
            
            if(layout === 'grid') {
                btnGrid.className = "p-2 text-xs font-semibold rounded bg-indigo-600 text-white";
                btnList.className = "p-2 text-xs font-semibold rounded text-gray-400 hover:text-white";
            } else {
                btnList.className = "p-2 text-xs font-semibold rounded bg-indigo-600 text-white";
                btnGrid.className = "p-2 text-xs font-semibold rounded text-gray-400 hover:text-white";
            }
            renderBookmarks();
        }

        // Filtrar Marcadores
        function filterBookmarks(filter) {
            currentFilter = filter;
            ['all', 'active', 'archived'].forEach(f => {
                const btn = document.getElementById(`filter-${f}`);
                if(f === filter) {
                    btn.className = "px-4 py-1.5 rounded-full text-xs font-semibold bg-indigo-500/20 text-indigo-400 border border-indigo-500/30";
                } else {
                    btn.className = "px-4 py-1.5 rounded-full text-xs font-semibold bg-gray-800 text-gray-400 hover:bg-gray-700";
                }
            });
            renderBookmarks();
        }

        // CRUD: Adicionar
        function addBookmark(e) {
            e.preventDefault();
            const titleInput = document.getElementById('input-title');
            const urlInput = document.getElementById('input-url');
            
            const newBookmark = {
                id: Date.now(),
                title: titleInput.value,
                url: urlInput.value,
                status: 'active'
            };

            bookmarks.push(newBookmark);
            titleInput.value = '';
            urlInput.value = '';
            renderBookmarks();
        }

        // CRUD: Arquivar / Desarquivar
        function toggleArchive(id) {
            bookmarks = bookmarks.map(b => {
                if(b.id === id) {
                    b.status = b.status === 'active' ? 'archived' : 'active';
                }
                return b;
            });
            renderBookmarks();
        }

        // CRUD: Excluir
        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(b => b.id !== id);
            renderBookmarks();
        }

        // Mudar Idioma e atualizar interface (incluindo direção RTL)
        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            // Atualiza Direção da Página (LTR vs RTL)
            const root = document.getElementById('app-root');
            root.setAttribute('dir', t.dir);
            root.setAttribute('lang', lang);

            // Atualiza Textos
            document.getElementById('txt-logo').innerText = t.logo;
            document.getElementById('txt-nav-dash').innerText = t.navDash;
            document.getElementById('txt-nav-settings').innerText = t.navSettings;
            document.getElementById('title-add').innerText = t.titleAdd;
            document.getElementById('input-title').placeholder = t.phTitle;
            document.getElementById('input-url').placeholder = t.phUrl;
            document.getElementById('btn-add').innerText = t.btnAdd;
            document.getElementById('filter-all').innerText = t.filterAll;
            document.getElementById('filter-active').innerText = t.filterActive;
            document.getElementById('filter-archived').innerText = t.filterArchived;
            document.getElementById('title-settings').innerText = t.titleSettings;
            document.getElementById('label-lang').innerText = t.labelLang;

            // Destaca botão ativo na sala de configurações
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if(btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('border-indigo-500', 'bg-indigo-600/10');
                } else {
                    btn.classList.remove('border-indigo-500', 'bg-indigo-600/10');
                }
            });

            renderBookmarks();
        }

        // Renderizar os Cards na Tela
        function renderBookmarks() {
            const container = document.getElementById('bookmarks-container');
            container.innerHTML = '';

            // Configura Grid ou Lista
            if(currentLayout === 'grid') {
                container.className = "grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4";
            } else {
                container.className = "flex flex-col space-y-3 w-full";
            }

            // Filtra os dados
            const filtered = bookmarks.filter(b => {
                if (currentFilter === 'all') return true;
                return b.status === currentFilter;
            });

            const t = translations[currentLang];

            // Cria os elementos HTML
            filtered.forEach(b => {
                const card = document.createElement('div');
                
                // Estilos base mudam conforme layout
                const layoutClasses = currentLayout === 'grid' 
                    ? "bg-gray-850 p-5 rounded-xl border border-gray-700 flex flex-col justify-between h-40 shadow transition-all hover:border-gray-600" 
                    : "bg-gray-850 p-4 rounded-xl border border-gray-700 flex justify-between items-center shadow transition-all hover:border-gray-600 w-full";

                card.className = layoutClasses;

                const isArchived = b.status === 'archived';
                const archiveIcon = isArchived ? 'fa-box-open' : 'fa-box';
                const archiveText = isArchived ? t.btnUnarchive : t.btnArchive;

                card.innerHTML = `
                    <div class="${currentLayout === 'grid' ? 'mb-4' : ''} flex-1 overflow-hidden">
                        <h3 class="font-bold text-white text-md truncate">${b.title}</h3>
                        <a href="${b.url}" target="_blank" class="text-xs text-indigo-400 hover:underline truncate block mt-1">${b.url}</a>
                        ${isArchived ? `<span class="inline-block mt-2 text-[10px] bg-yellow-500/10 text-yellow-500 px-2 py-0.5 rounded border border-yellow-500/20">${t.filterArchived}</span>` : ''}
                    </div>
                    <div class="flex items-center space-x-2 rtl:space-x-reverse justify-end ${currentLayout === 'grid' ? 'border-t border-gray-700/50 pt-3' : ''}">
                        <button onclick="toggleArchive(${b.id})" title="${archiveText}" class="px-3 py-1.5 rounded bg-gray-750 hover:bg-gray-700 text-gray-300 text-xs flex items-center gap-1 transition-all">
                            <i class="fa-solid ${archiveIcon}"></i> <span class="hidden sm:inline">${archiveText}</span>
                        </button>
                        <button onclick="deleteBookmark(${b.id})" title="${t.btnDelete}" class="px-3 py-1.5 rounded bg-red-900/20 hover:bg-red-900/40 text-red-400 text-xs flex items-center gap-1 transition-all">
                            <i class="fa-solid fa-trash"></i> <span class="hidden sm:inline">${t.btnDelete}</span>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Inicialização do App
        setLanguage('pt');
    </script>
</body>
</html>
