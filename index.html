<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Escrita 📝</title>
    <style>
        /* ==========================================================================
           PALETAS ULTRA MODERNAS & ÍCONES DINÂMICOS POR TEMA
           ========================================================================== */
        
        /* 1. NORDIC GLASS (Padrão: Minimalista, Frio, Linhas Retas) */
        :root[data-theme="megamix"] {
            --bg-main: #080b11;
            --bg-sidebar: rgba(13, 17, 26, 0.7);
            --surface: rgba(22, 28, 41, 0.45);
            --surface-hover: rgba(30, 39, 57, 0.6);
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #3b82f6;
            --secondary: #60a5fa;
            --gradient-accent: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.06);
            --shadow: rgba(0, 0, 0, 0.4);
            --glass-blur: blur(16px);
            
            /* Ícones do Tema */
            --ico-archive: "📁";
            --ico-trash: "🗑️";
            --ico-settings: "⚙️";
        }

        /* 2. DEEP PURPLE GLASS (Místico, Neon Espacial, Arcano) */
        :root[data-theme="royal"] {
            --bg-main: #05050a;
            --bg-sidebar: rgba(10, 10, 20, 0.8);
            --surface: rgba(20, 20, 35, 0.5);
            --surface-hover: rgba(30, 30, 55, 0.7);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --primary: #6366f1;
            --secondary: #a5b4fc;
            --gradient-accent: linear-gradient(135deg, #6366f1, #4f46e5);
            --danger: #f43f5e;
            --border: rgba(255, 255, 255, 0.05);
            --shadow: rgba(0, 0, 0, 0.5);
            --glass-blur: blur(20px);
            
            /* Ícones do Tema */
            --ico-archive: "🔮";
            --ico-trash: "⚰️";
            --ico-settings: "👁️‍🗨️";
        }

        /* 3. AURORA EMERALD (Bio-Tech, Cyber, Matriz Orgânica) */
        :root[data-theme="cyber"] {
            --bg-main: #030712;
            --bg-sidebar: rgba(17, 24, 39, 0.7);
            --surface: rgba(31, 41, 55, 0.4);
            --surface-hover: rgba(55, 65, 81, 0.6);
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #10b981;
            --secondary: #34d399;
            --gradient-accent: linear-gradient(135deg, #10b981, #06b6d4);
            --danger: #f43f5e;
            --border: rgba(255, 255, 255, 0.07);
            --shadow: rgba(0, 0, 0, 0.4);
            --glass-blur: blur(12px);
            
            /* Ícones do Tema */
            --ico-archive: "💾";
            --ico-trash: "☣️";
            --ico-settings: "🛸";
        }

        /* 4. VOLCANIC ASH (Industrial, Sobrevivência, Destrutivo) */
        :root[data-theme="magma"] {
            --bg-main: #0c0a09;
            --bg-sidebar: rgba(28, 25, 23, 0.7);
            --surface: rgba(41, 37, 36, 0.45);
            --surface-hover: rgba(68, 64, 60, 0.6);
            --text: #fafaf9;
            --text-muted: #a8a29e;
            --primary: #f97316;
            --secondary: #fb923c;
            --gradient-accent: linear-gradient(135deg, #f97316, #dc2626);
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.05);
            --shadow: rgba(0, 0, 0, 0.6);
            --glass-blur: blur(15px);
            
            /* Ícones do Tema */
            --ico-archive: "📦";
            --ico-trash: "🔥";
            --ico-settings: "⚒️";
        }

        /* 5. CYBERPUNK NEON (Alto Contraste, Hackerspace, Retrofuturista) */
        :root[data-theme="neon"] {
            --bg-main: #000000;
            --bg-sidebar: rgba(5, 5, 5, 0.85);
            --surface: rgba(15, 15, 15, 0.9);
            --surface-hover: rgba(25, 25, 25, 1);
            --text: #39ff14; /* Verde Neon */
            --text-muted: #00ffcc; /* Ciano Neon */
            --primary: #ff007f; /* Rosa Choque */
            --secondary: #39ff14;
            --gradient-accent: linear-gradient(135deg, #ff007f, #9d00ff);
            --danger: #ff0033;
            --border: #39ff14;
            --shadow: rgba(57, 255, 20, 0.15);
            --glass-blur: blur(0px);
            
            /* Ícones do Tema */
            --ico-archive: "💾";
            --ico-trash: "⚡";
            --ico-settings: "📟";
        }

        /* 6. PERFORMANCE ECO (Totalmente Otimizado, Sem Blurs, Hardware Fraco/Bateria) */
        :root[data-theme="eco"] {
            --bg-main: #121214;
            --bg-sidebar: #1a1a1e;
            --surface: #222227;
            --surface-hover: #2d2d34;
            --text: #eceff4;
            --text-muted: #4c566a;
            --primary: #88c0d0;
            --secondary: #81a1c1;
            --gradient-accent: #88c0d0;
            --danger: #bf616a;
            --border: #2e3440;
            --shadow: none;
            --glass-blur: blur(0px);
            
            /* Ícones do Tema */
            --ico-archive: "📁";
            --ico-trash: "🗑️";
            --ico-settings: "⚙️";
        }

        /* Aplicação dos Pseudo-Elementos para troca dinâmica de ícones */
        .dynamic-ico-archive::before { content: var(--ico-archive) " "; }
        .dynamic-ico-trash::before { content: var(--ico-trash) " "; }
        .dynamic-ico-settings::before { content: var(--ico-settings) " "; }

        /* ==========================================================================
           ESTILOS DE INTERFACE E ESTRUTURA
           ========================================================================== */

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-main);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        /* Fundo com degradê leve para os temas convencionais */
        :root:not([data-theme="neon"]):not([data-theme="magma"]):not([data-theme="eco"]) body {
            background-image: radial-gradient(circle at 80% 20%, rgba(59, 130, 246, 0.06) 0%, transparent 50%),
                              radial-gradient(circle at 20% 80%, rgba(139, 92, 246, 0.04) 0%, transparent 50%);
        }
        
        /* Canvas para Efeitos de Fundo */
        #fxCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: none;
        }
        :root[data-theme="neon"] #fxCanvas, :root[data-theme="magma"] #fxCanvas {
            display: block;
        }

        body.rtl { flex-direction: row-reverse; direction: rtl; }
        body.rtl .sidebar { border-right: none; border-left: 1px solid var(--border); }
        body.rtl .btn-new-book { text-align: right; }
        body.rtl .btn-floating-trigger { left: auto; right: 20px; }
        body.rtl .btn-tool { text-align: right; }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            box-sizing: border-box;
            border-right: 1px solid var(--border);
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
            z-index: 10;
        }
        .sidebar.collapsed { width: 0; padding: 20px 0; overflow: hidden; border-color: transparent; }
        
        .sidebar-top-row { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; width: 100%; }
        
        .btn-new-book {
            flex: 1;
            background: var(--gradient-accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: .9rem;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
        }
        :root[data-theme="eco"] .btn-new-book { color: #121214; box-shadow: none; }
        .btn-new-book:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); opacity: 0.95; }
        :root[data-theme="eco"] .btn-new-book:hover { box-shadow: none; }
        
        .btn-toggle-sidebar {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .btn-toggle-sidebar:hover { background: var(--surface-hover); border-color: var(--text-muted); }
        
        .btn-floating-trigger {
            position: absolute;
            top: 20px;
            left: 20px;
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 12px;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            z-index: 5;
            transition: all 0.3s;
            box-shadow: 0 4px 12px var(--shadow);
        }
        .sidebar.collapsed ~ .btn-floating-trigger { display: flex; }
        .btn-floating-trigger:hover { background: var(--surface-hover); }

        .book-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; padding-right: 2px; }
        .book-list::-webkit-scrollbar { width: 4px; }
        .book-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: .88rem;
            border: 1px solid transparent;
            transition: all 0.25s;
            background: transparent;
        }
        .book-item:hover { background: var(--surface-hover); }
        .book-item.active {
            background: var(--surface);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1), 0 4px 12px var(--shadow);
            color: #fff;
            font-weight: 500;
        }
        :root[data-theme="eco"] .book-item.active { box-shadow: none; border-color: var(--primary); color: var(--primary); }
        :root[data-theme="neon"] .book-item.active { color: #39ff14; }
        .book-title-tab { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 75%; text-align: left; }
        body.rtl .book-title-tab { text-align: right; }
        .actions-tab { display: none; gap: 8px; }
        .book-item:hover .actions-tab { display: flex; }
        .btn-action-tab { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; padding: 0; transition: color 0.2s; }
        .btn-action-tab:hover { color: var(--primary); }
        .btn-action-tab.del:hover { color: var(--danger); }
        
        .sub-section { margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; }
        .sub-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .sub-header:hover { color: var(--text); }
        .sub-list { display: none; flex-direction: column; gap: 4px; max-height: 120px; overflow-y: auto; }
        .sub-list.visible { display: flex; }
        
        .sidebar-footer { border-top: 1px solid var(--border); padding-top: 15px; display: flex; flex-direction: column; gap: 6px; }
        .btn-tool { background: none; border: none; color: var(--text-muted); font-size: .82rem; text-align: left; padding: 10px 12px; cursor: pointer; border-radius: 10px; transition: all 0.2s; }
        .btn-tool:hover { background: var(--surface-hover); color: var(--text); }
        
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 30px; overflow-y: auto; position: relative; z-index: 2; }
        
        .card {
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px var(--shadow), inset 0 1px 1px rgba(255,255,255,0.05);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            transition: all 0.4s ease;
        }
        :root[data-theme="eco"] .card { box-shadow: none; }
        
        .inline-title-edit {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
            padding: 4px;
            border-bottom: 1px solid transparent;
            transition: all 0.3s;
        }
        :root[data-theme="eco"] .inline-title-edit { color: var(--text); }
        :root[data-theme="neon"] .inline-title-edit { color: #39ff14; }
        .inline-title-edit:focus { border-bottom-color: var(--primary); outline: none; }
        
        .form-group { margin-bottom: 16px; text-align: left; }
        body.rtl .form-group { text-align: right; }
        
        label { display: block; margin-bottom: 6px; font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
        
        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            box-sizing: border-box;
            font-size: .95rem;
            text-align: center;
            transition: all 0.3s;
        }
        :root[data-theme="eco"] input[type="text"], :root[data-theme="eco"] input[type="number"], :root[data-theme="eco"] select { background: #1a1a1e; color: var(--text); }
        :root[data-theme="neon"] input[type="text"], :root[data-theme="neon"] input[type="number"], :root[data-theme="neon"] select { color: #39ff14; background: #000000; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--primary); outline: none; background: rgba(0, 0, 0, 0.3); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); }
        :root[data-theme="eco"] input[type="text"]:focus, :root[data-theme="eco"] input[type="number"]:focus, :root[data-theme="eco"] select:focus { box-shadow: none; }
        :root[data-theme="neon"] input[type="text"]:focus, :root[data-theme="neon"] input[type="number"]:focus, :root[data-theme="neon"] select:focus { box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.2); }

        .btn-save {
            width: 100%;
            padding: 14px;
            background: var(--gradient-accent);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-weight: 600;
            font-size: .95rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2);
            transition: all 0.3s;
        }
        :root[data-theme="eco"] .btn-save { color: #121214; box-shadow: none; }
        .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); opacity: 0.95; }
        :root[data-theme="eco"] .btn-save:hover { box-shadow: none; }
        
        .progress-container { margin: 25px 0 8px 0; background: rgba(255,255,255,0.04); border-radius: 10px; height: 8px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background: var(--gradient-accent); width: 0%; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }
        .stats { text-align: center; font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        
        .history { margin-top: 25px; max-height: 110px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 15px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .history h3 { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin: 0; }
        .btn-clear-history { background: none; border: none; color: var(--danger); cursor: pointer; font-size: .75rem; opacity: 0.7; font-weight: 600; transition: opacity 0.2s; }
        .btn-clear-history:hover { opacity: 1; }
        .history-item { display: flex; justify-content: space-between; font-size: .8rem; color: var(--text-muted); margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px dashed rgba(255,255,255,0.03); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; animation: fadeIn 0.3s ease; }
        :root[data-theme="eco"] .modal-overlay { backdrop-filter: none; background: rgba(0, 0, 0, 0.75); }
        .modal-overlay.visible { display: flex; }
        .modal-card { background: var(--bg-sidebar); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 1px solid var(--border); border-radius: 24px; padding: 30px; width: 90%; max-width: 380px; box-shadow: 0 25px 60px var(--shadow); max-height: 85vh; overflow-y: auto; }
        :root[data-theme="eco"] .modal-card { box-shadow: none; }
        .modal-title { margin-top: 0; font-size: 1.25rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 20px; }
        :root[data-theme="eco"] .modal-title { color: var(--text); }
        :root[data-theme="neon"] .modal-title { color: #39ff14; }
        .modal-footer { display: flex; justify-content: flex-end; margin-top: 20px; }
        .btn-close-modal { padding: 10px 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.88rem; transition: all 0.2s; }
        .btn-close-modal:hover { background: var(--surface-hover); }

        .profile-section { border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 20px; background: rgba(0,0,0,0.15); }
        .profile-badge { font-size: 0.9rem; font-weight: 600; color: #fff; text-align: center; margin-bottom: 15px; }
        :root[data-theme="eco"] .profile-badge { color: var(--text); }
        :root[data-theme="neon"] .profile-badge { color: #00ffcc; }
        .btn-profile-action { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 500; margin-top: 6px; transition: all 0.2s; }
        .btn-profile-action:hover { background: var(--surface-hover); border-color: var(--text-muted); }
        
        #importBackupInput, #importProfileInput { display: none; }
        .empty-state { text-align: center; color: var(--text-muted); }
        .empty-state h2 { color: #fff; font-size: 1.4rem; margin-bottom: 8px; }
        :root[data-theme="eco"] .empty-state h2 { color: var(--text); }
        :root[data-theme="neon"] .empty-state h2 { color: #39ff14; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ==========================================================================
           OTIMIZAÇÕES DE MÍDIA PARA JANELAS POP-UP E MINI TELAS (360px de largura)
           ========================================================================== */
        @media (max-width: 600px) {
            .sidebar {
                position: absolute;
                left: 0;
                top: 0;
                height: 100%;
                width: 230px;
                box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            }
            .sidebar.collapsed {
                width: 0;
                padding-left: 0;
                padding-right: 0;
            }
            .sidebar.collapsed ~ .btn-floating-trigger {
                display: flex;
            }
            .btn-floating-trigger {
                display: flex;
                top: 15px;
                left: 15px;
                width: 36px;
                height: 36px;
                font-size: 0.9rem;
            }
            .main-content {
                padding: 12px;
            }
            .card {
                padding: 16px;
                border-radius: 16px;
            }
            .inline-title-edit {
                font-size: 1.3rem;
                margin-bottom: 12px;
            }
            input[type="text"], input[type="number"], select {
                padding: 10px 12px;
                font-size: 0.9rem;
            }
            .btn-save {
                padding: 12px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="fxCanvas"></canvas>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-top-row">
            <button class="btn-new-book" id="lblNewBook" onclick="createNewBook()">➕ Novo livro</button>
            <button class="btn-toggle-sidebar" id="lblArrowSide" onclick="toggleSidebar()">◀</button>
        </div>
        
        <div class="book-list" id="bookList"></div>
        
        <div class="sub-section">
            <div class="sub-header" onclick="toggleSection('archiveList','archiveArrow')">
                <span id="lblArchiveSec" class="dynamic-ico-archive">Arquivados (0)</span>
                <span id="archiveArrow">▶</span>
            </div>
            <div class="sub-list" id="archiveList"></div>
        </div>

        <div class="sub-section">
            <div class="sub-header" onclick="toggleSection('trashList','trashArrow')">
                <span id="lblTrashSec" class="dynamic-ico-trash">Lixeira (0/5)</span>
                <span id="trashArrow">▶</span>
            </div>
            <div class="sub-list" id="trashList"></div>
        </div>

        <div class="sidebar-footer">
            <button class="btn-tool dynamic-ico-settings" id="lblSettingsBtn" onclick="openSettings()">Perfil / Configurações</button>
            <button class="btn-tool" id="lblPopUpBtn" onclick="openInPopUp()">🔲 Abrir em Pop-up</button>
            <button class="btn-tool" id="lblExportBtn" onclick="exportBackup()">📥 Exportar Tudo</button>
            <button class="btn-tool" id="lblImportBtn" onclick="document.getElementById('importBackupInput').click()">📤 Importar Tudo</button>
            <input type="file" id="importBackupInput" accept=".json" onchange="importBackup(event)">
        </div>
    </div>

    <button class="btn-floating-trigger" onclick="toggleSidebar()" title="Menu">☰</button>

    <div class="main-content">
        <div class="card" id="editorCard" style="display:none">
            <input type="text" id="bookTitle" class="inline-title-edit" oninput="updateBookTitle(this.value)">

        /* ==========================================================================
           MODIFICADO: SELETOR DE DIMENSÃO ULTRA-COMPACTA PARA O POP-UP (360x580)
           ========================================================================== */
        function openInPopUp() {
            const width = 360;
            const height = 580;
            const left = (screen.width / 2) - (width / 2);
            const top = (screen.height / 2) - (height / 2);
            
            window.open(
                window.location.href, 
                'WritingTrackerPopUp', 
                `width=${width},height=${height},top=${top},left=${left},menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=yes`
            );
        }

        /* ==========================================================================
           SISTEMA DE EFEITOS DINÂMICOS (CANVAS)
           ========================================================================== */
        function resizeCanvas() {
            if (currentTheme === 'neon' || currentTheme === 'magma') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                if(currentTheme === 'neon') initNeonRain();
            }
        }

        function initNeonRain() {
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            rainDrops = [];
            for (let x = 0; x < columns; x++) {
                rainDrops[x] = Math.random() * -100;
            }
        }

        function manageDynamicEffects() {
            if (fxInterval) {
                clearInterval(fxInterval);
                fxInterval = null;
            }

            if (currentTheme !== 'neon' && currentTheme !== 'magma') {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            resizeCanvas();

            if (currentTheme === 'neon') {
                initNeonRain();
                const katakana = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ1234567890XYZ';
                const alphabet = katakana.split('');
                const fontSize = 14;

                fxInterval = setInterval(() => {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.fillStyle = '#39ff14';
                    ctx.font = fontSize + 'px monospace';

                    for (let i = 0; i < rainDrops.length; i++) {
                        const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                        if(rainDrops[i] >= 0) {
                            ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                        }

                        if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                            rainDrops[i] = 0;
                        }
                        rainDrops[i]++;
                    }
                }, 33);

            } else if (currentTheme === 'magma') {
                embers = [];
                const maxEmbers = 45;

                fxInterval = setInterval(() => {
                    ctx.fillStyle = 'rgba(12, 10, 9, 0.15)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (embers.length < maxEmbers && Math.random() < 0.4) {
                        embers.push({
                            x: Math.random() * canvas.width,
                            y: canvas.height + 10,
                            size: Math.random() * 3 + 1,
                            speedY: Math.random() * 1.5 + 0.5,
                            speedX: (Math.random() - 0.5) * 0.6,
                            alpha: 1,
                            decay: Math.random() * 0.008 + 0.003,
                            colorHue: Math.random() > 0.3 ? Math.floor(Math.random() * 20) + 15 : Math.floor(Math.random() * 15)
                        });
                    }

                    for (let i = embers.length - 1; i >= 0; i--) {
                        let p = embers[i];
                        p.y -= p.speedY;
                        p.x += p.speedX;
                        p.alpha -= p.decay;

                        ctx.fillStyle = `hsla(${p.colorHue}, 100%, 55%, ${p.alpha})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();

                        if (p.alpha <= 0 || p.y < -10) {
                            embers.splice(i, 1);
                        }
                    }
                }, 25);
            }
        }

        function createNewBook() {
            const lang = i18n[currentLang] || i18n.pt;

            selectBook(id);
        }

        function selectBook(id) {
            if(!booksData[id] || booksData[id].status === 'trash') return;
            activeBookId = id;
            loadBook(id);
            renderSidebar();
            
            if(window.innerWidth <= 600) {
                document.getElementById('sidebar').classList.add('collapsed');
            }
        }

        function loadBook(id) {
            const book = booksData[id];
            document.getElementById('bookTitle').value = book.title || "";
            document.getElementById('totalPages').value = book.totalPages || 0;
            document.getElementById('currentPage').value = book.currentPage || 0;
            
            updateProgressBar(book);
            renderHistoryLog(book);
            
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('editorCard').style.display = 'block';
        }

        function updateBookTitle(val) {
            if(!activeBookId || !booksData[activeBookId]) return;
            booksData[activeBookId].title = val;
            saveToLocalStorage();
            
            const element = document.querySelector(`[data-id="${activeBookId}"] .book-title-tab`);
            if(element) element.innerText = val || i18n[currentLang].untitiled;
        }

        function saveProgress() {
            if(!activeBookId || !booksData[activeBookId]) return;
            const book = booksData[activeBookId];
            const total = parseInt(document.getElementById('totalPages').value) || 0;
            const current = parseInt(document.getElementById('currentPage').value) || 0;
            const lang = i18n[currentLang] || i18n.pt;

            if(current > total) {
                alert(lang.alertMaxTrash);
                return;
            }

            book.totalPages = total;
            book.currentPage = current;

            const timestamp = new Date().toLocaleDateString(currentLang, {day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'});
            book.history.unshift({
                date: timestamp,
                page: current
            });

            if(book.history.length > 30) book.history.pop();

            saveToLocalStorage();
            updateProgressBar(book);
            renderHistoryLog(book);
            renderSidebar();
        }

        function updateProgressBar(book) {
            const lang = i18n[currentLang] || i18n.pt;
            const total = book.totalPages || 0;
            const current = book.currentPage || 0;
            const pct = total > 0 ? Math.min(Math.round((current / total) * 100), 100) : 0;

            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('stats').innerText = `${current}/${total} ${lang.pages} (${pct}%)`;
        }

        function renderHistoryLog(book) {
            const container = document.getElementById('historyLog');
            container.innerHTML = "";
            const lang = i18n[currentLang] || i18n.pt;

            (book.history || []).forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>${item.date}</span> <strong>${lang.labelPage} ${item.page}</strong>`;
                container.appendChild(div);
            });
        }

        function clearBookHistory() {
            if(!activeBookId || !booksData[activeBookId]) return;
            const lang = i18n[currentLang] || i18n.pt;
            if(!confirm(lang.confirmClearHistory)) return;

            booksData[activeBookId].history = [];
            saveToLocalStorage();
            renderHistoryLog(booksData[activeBookId]);
        }

        /* ==========================================================================
           CONTROLE DE FLUXO DE ACERVO
           ========================================================================= */
        function changeBookStatus(id, newStatus) {
            if(!booksData[id]) return;
            
            if(newStatus === 'trash') {
                const trashCount = Object.values(booksData).filter(b => b.status === 'trash').length;
                if(trashCount >= 5) {
                    const trashBooks = Object.values(booksData).filter(b => b.status === 'trash').sort((a,b) => a.id.localeCompare(b.id));
                    if(trashBooks.length > 0) delete booksData[trashBooks[0].id];
                }
            }

            booksData[id].status = newStatus;
            
            if(activeBookId === id && newStatus !== 'active') {
                activeBookId = null;
                document.getElementById('editorCard').style.display = 'none';
            }

            saveToLocalStorage();
            renderSidebar();
            checkEmptyState();
        }

        function hardDeleteBook(id) {
            if(!booksData[id]) return;
            const lang = i18n[currentLang] || i18n.pt;
            if(!confirm(lang.confirmHardDelete.replace("{title}", booksData[id].title))) return;

            delete booksData[id];
            saveToLocalStorage();
            renderSidebar();
        }

        /* ==========================================================================
           INTERFACES DE RENDERIZAÇÃO DA SIDEBAR
           ========================================================================== */
        function renderSidebar() {
            const listContainer = document.getElementById('bookList');
            const archiveContainer = document.getElementById('archiveList');
            const trashContainer = document.getElementById('trashList');
            const lang = i18n[currentLang] || i18n.pt;

            listContainer.innerHTML = "";
            archiveContainer.innerHTML = "";
            trashContainer.innerHTML = "";

            Object.values(booksData).forEach(book => {
                const item = document.createElement('div');
                item.className = `book-item ${book.id === activeBookId ? 'active' : ''}`;
                item.setAttribute('data-id', book.id);

                const titleSpan = document.createElement('span');
                titleSpan.className = 'book-title-tab';
                titleSpan.innerText = book.title || lang.untitiled;

                if(book.status === 'active') {
                    item.onclick = () => selectBook(book.id);
                    item.appendChild(titleSpan);

                    const actions = document.createElement('div');
                    actions.className = 'actions-tab';
                    actions.innerHTML = `
                        <button class="btn-action-tab" onclick="event.stopPropagation(); changeBookStatus('${book.id}', 'archived')" title="Arquivar">📦</button>
                        <button class="btn-action-tab del" onclick="event.stopPropagation(); changeBookStatus('${book.id}', 'trash')" title="Lixeira">🗑️</button>
                    `;
                    item.appendChild(actions);
                    listContainer.appendChild(item);

                } else if(book.status === 'archived') {
                    item.appendChild(titleSpan);
                    const actions = document.createElement('div');
                    actions.className = 'actions-tab';
                    actions.innerHTML = `
                        <button class="btn-action-tab" onclick="event.stopPropagation(); changeBookStatus('${book.id}', 'active')" title="Desarquivar">📤</button>
                        <button class="btn-action-tab del" onclick="event.stopPropagation(); changeBookStatus('${book.id}', 'trash')" title="Lixeira">🗑️</button>
                    `;
                    item.appendChild(actions);
                    archiveContainer.appendChild(item);

                } else if(book.status === 'trash') {
                    item.appendChild(titleSpan);
                    const actions = document.createElement('div');
                    actions.className = 'actions-tab';
                    actions.innerHTML = `
                        <button class="btn-action-tab" onclick="event.stopPropagation(); changeBookStatus('${book.id}', 'active')" title="Restaurar">↩️</button>
                        <button class="btn-action-tab del" onclick="event.stopPropagation(); hardDeleteBook('${book.id}')" title="Excluir Definitivamente">❌</button>
                    `;
                    item.appendChild(actions);
                    trashContainer.appendChild(item);
                }
            });

            updateSectionCounters();
        }

        function updateSectionCounters() {
            const lang = i18n[currentLang] || i18n.pt;
            const cArchive = Object.values(booksData).filter(b => b.status === 'archived').length;
            const cTrash = Object.values(booksData).filter(b => b.status === 'trash').length;

            document.getElementById('lblArchiveSec').innerText = `${lang.archiveSec} (${cArchive})`;
            document.getElementById('lblTrashSec').innerText = `${lang.trashSec} (${cTrash}/5)`;
        }

        function toggleSection(listId, arrowId) {
            vis[listId] = !vis[listId];
            const el = document.getElementById(listId);
            const arrow = document.getElementById(arrowId);
            
            if(vis[listId]) {
                el.classList.add('visible');
                arrow.innerText = "▼";
            } else {
                el.classList.remove('visible');
                arrow.innerText = "▶";
            }
        }

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('collapsed');
        }

        function checkEmptyState() {
            if(!activeBookId) {
                document.getElementById('editorCard').style.display = 'none';
                document.getElementById('emptyState').style.display = 'block';
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('wt_books_data', JSON.stringify(booksData));
        }

        /* ==========================================================================
           MODAL E CONFIGURAÇÃO DE PROFILE/BACKUPS
           ========================================================================== */
        function openSettings() {
            document.getElementById('settingsModal').classList.add('visible');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('visible');
        }

        /* ==========================================================================
           BACKUPS E EXPORTAÇÃO
           ========================================================================== */
        function exportBackup() {
            const backup = {
                version: APP_VERSION,
                profileName: profileName,
                theme: currentTheme,
                lang: currentLang,
                books: booksData
            };
            downloadJson(backup, `Rastreador_Escrita_Backup.json`);
        }

        function importBackup(event) {
            const lang = i18n[currentLang] || i18n.pt;
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(!data.books) throw new Error();
                    
                    if(confirm(lang.confirmImport)) {
                        booksData = data.books;
                        if(data.profileName) profileName = data.profileName;
                        if(data.theme) currentTheme = data.theme;
                        if(data.lang) currentLang = data.lang;

                        localStorage.setItem('wt_profile_name', profileName);
                        localStorage.setItem('wt_theme', currentTheme);
                        localStorage.setItem('wt_lang', currentLang);
                        document.documentElement.setAttribute('data-theme', currentTheme);
                        
                        saveToLocalStorage();
                        updateInterfaceLanguage();
                        renderSidebar();
                        activeBookId = null;
                        checkEmptyState();
                        manageDynamicEffects();
                    }
                } catch(err) {
                    alert(lang.invalidJson);
                }
            };
            reader.readAsText(file);
        }

        function exportProfileOnly() {
            const profile = {
                profileName: profileName,
                theme: currentTheme,
                lang: currentLang
            };
            downloadJson(profile, `Perfil_${profileName.replace(/\s+/g, '_')}.json`);
        }

        function importProfileOnly(event) {
            const lang = i18n[currentLang] || i18n.pt;
            const file = event.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if(!data.profileName) {
                        alert(lang.invalidProf);
                        return;
                    }
                    if(confirm(lang.confirmImportProf.replace("{name}", data.profileName))) {
                        profileName = data.profileName;
                        if(data.theme) currentTheme = data.theme;
                        if(data.lang) currentLang = data.lang;

                        localStorage.setItem('wt_profile_name', profileName);
                        localStorage.setItem('wt_theme', currentTheme);
                        localStorage.setItem('wt_lang', currentLang);
                        
                        document.documentElement.setAttribute('data-theme', currentTheme);
                        document.getElementById('settingTheme').value = currentTheme;
                        document.getElementById('settingLang').value = currentLang;
                        document.getElementById('profileNameInput').value = profileName;

                        updateInterfaceLanguage();
                        manageDynamicEffects();
                    }
                } catch(err) {
                    alert(lang.errFile);
                }
            };
            reader.readAsText(file);
        }

        function downloadJson(obj, filename) {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(obj, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", filename);
            dlAnchorElem.click();
            dlAnchorElem.remove();
        }
    </script>
</body>
</html>
